spring:
  application:
    name: evals
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-mini
          temperature: 1.0
    chat:
      observations:
        include-error-logging: true
        log-completion: false
        log-prompt: false
    tools:
      observations:
        include-content: true