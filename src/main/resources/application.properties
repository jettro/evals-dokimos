spring.application.name=evals

# Spring AI - OpenAI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

# Langfuse Configuration for Observability
# Connect to Langfuse via OTLP (running locally on port 3000)
management.otlp.tracing.endpoint=http://localhost:3000/api/public/otlp/v1/traces
# Configure OTLP log exporting to Langfuse (running locally on port 3000)
management.otlp.logging.endpoint=http://localhost:3000/api/public/otlp/v1/logs
# Langfuse API keys (Public and Secret) should be set in environment variables
# For OTLP, Langfuse typically uses Basic Auth with public:secret
# You can set this as a header directly if your SDK supports it or via an environment variable
# management.otlp.tracing.headers.Authorization=Basic <base64(public:secret)>
# Alternatively, set Langfuse specific keys if using a dedicated exporter, 
# but here we use standard OTLP:
langfuse.public-key=${LANGFUSE_PUBLIC_KEY}
langfuse.secret-key=${LANGFUSE_SECRET_KEY}

# Enable tracing and Spring AI observations
management.tracing.sampling.probability=1.0
management.observations.annotations.enabled=true
spring.ai.chat.observations.include-error-logging=true
spring.ai.chat.observations.log-completion=true
spring.ai.chat.observations.log-prompt=true

# Agent Browser
agent-browser.headed=true
