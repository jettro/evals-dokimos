spring.application.name=evals

# Spring AI - OpenAI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-5-mini
spring.ai.openai.chat.options.temperature=1.0

# Langfuse Configuration for Observability via OpenTelemetry
# The opentelemetry-spring-boot-starter reads OTEL_EXPORTER_OTLP_* env vars (not management.otlp.*).
# Set these environment variables before starting the application:
#   OTEL_EXPORTER_OTLP_ENDPOINT=https://cloud.langfuse.com/api/public/otel
#   OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic <base64(publicKey:secretKey)>
#   OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
# For local Langfuse, use: http://localhost:3000/api/public/otel

# Enable tracing and Spring AI observations
management.tracing.sampling.probability=1.0
management.observations.annotations.enabled=true
spring.ai.chat.observations.include-error-logging=true
spring.ai.chat.observations.log-completion=true
spring.ai.chat.observations.log-prompt=true
spring.ai.tools.observations.include-content=true

# Agent Browser
agent-browser.headed=true
